<ion-header [translucent]="true">
  <ion-toolbar class="principal">
    <ion-buttons slot="start">
      <ion-menu-button auto-hide="false"></ion-menu-button>
    </ion-buttons>
    <img src="assets/img/Logo.png" alt="">
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-fab  slot="fixed" vertical="top" horizontal="end" [edge]="true">
    <ion-fab-button class="principal" (click)="openModal()" >
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
  <ion-card>
    <ion-card-header>
      <ion-card-title>Credencial</ion-card-title>
    </ion-card-header>

    <ion-row>
      <ion-col size="3">
      </ion-col>
      <ion-col>
        <ion-thumbnail>
            <img src="assets/img/perfil.jpg" alt=""> 
        </ion-thumbnail>
      </ion-col>
      <ion-col size="3">
      </ion-col>
    </ion-row>
    <ion-card-content>
      <p>Nombre</p>
      <ion-item>
        <ion-label>{{infoUsuario.nombre}}</ion-label>
      </ion-item>
      <p>R.U.T</p>
      <ion-item>
        <ion-label>{{infoUsuario.rut}}</ion-label>
      </ion-item>
      <p>Correo</p>
      <ion-item>
        <ion-label>{{infoUsuario.correo}}</ion-label>
      </ion-item>
    </ion-card-content>
  </ion-card>
  
  <ion-card>
    <ion-card-content>
      <p>Carrera</p>
      <ion-item>
        <ion-label>{{infoExtraUsuario.carrera}}</ion-label>
      </ion-item>
      <p>Semestre</p>
      <ion-item>
        <ion-label>{{infoExtraUsuario.semestre}}</ion-label>
      </ion-item>
      <p>N° de Celular</p>
      <ion-item>
        <ion-label>{{infoExtraUsuario.numeroCelular}}</ion-label>
      </ion-item>
    </ion-card-content>
  </ion-card>
</ion-content>
