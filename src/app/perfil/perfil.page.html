<ion-header [translucent]="true">
  <ion-toolbar class="principal">
    <ion-buttons slot="start">
      <ion-menu-button auto-hide="false"></ion-menu-button>
    </ion-buttons>
    <img src="assets/img/Logo.png" alt="">
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-fab  slot="fixed" vertical="top" horizontal="end" [edge]="true">
    <ion-fab-button class="principal" (click)="mostrarFormularioInfoExtra()" >
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
  <ion-card>
    <ion-card-header>
      <ion-card-title>Credencial</ion-card-title>
    </ion-card-header>

    <ion-row>
      <ion-col size="3">
      </ion-col>
      <ion-col>
        <ion-thumbnail>
            <img src="assets/img/perfil.jpg" alt=""> 
        </ion-thumbnail>
      </ion-col>
      <ion-col size="3">
      </ion-col>
    </ion-row>
    <ion-card-content>
      <p>Nombre</p>
      <ion-item>
        <ion-label>{{infoUsuario.nombre}}</ion-label>
      </ion-item>
      <p>R.U.T</p>
      <ion-item>
        <ion-label>{{infoUsuario.rut}}</ion-label>
      </ion-item>
      <p>Correo</p>
      <ion-item>
        <ion-label>{{infoUsuario.correo}}</ion-label>
      </ion-item>
    </ion-card-content>
  </ion-card>
  
  <ion-card>
    <ion-card-content>
      <p>Carrera</p>
      <ion-item>
        <ion-label>{{infoUsuario.nombre}}</ion-label>
      </ion-item>
      <p>Semestre</p>
      <ion-item>
        <ion-label>Semestre en curso</ion-label>
        <ion-select placeholder="Make a Selection">
          <ion-select-option value="1">I</ion-select-option>
          <ion-select-option value="2">II</ion-select-option>
          <ion-select-option value="3">III</ion-select-option>
          <ion-select-option value="4">IV</ion-select-option>
          <ion-select-option value="5">V</ion-select-option>
          <ion-select-option value="6">VI</ion-select-option>
          <ion-select-option value="7">VII</ion-select-option>
          <ion-select-option value="8">VIII</ion-select-option>
          <ion-select-option value="9">IX</ion-select-option>
          <ion-select-option value="10">X</ion-select-option>
        </ion-select>
      </ion-item>
      <p>N° de Celular</p>
      <ion-item>
        <ion-label>{{infoUsuario.correo}}</ion-label>
      </ion-item>
    </ion-card-content>
  </ion-card>
</ion-content>
